system:
  name: NexusDB
  version: "4.6"

retrieval:
  strategy: direct_file_search
  fallback: mocs_and_grep

search:
  priority:
    - NOTES
    - NODES
    - 03_MOC
    - 02_NEW-KNOWLEDGE
    - 01_RAW

ai:
  provider: cloud_antigravity
  model: gemini
  prefer_existing_notes: true
  avoid_duplicates: true
  cite_sources: true

performance:
  cache: true
  max_files: 150

ignore:
  directories:
    - .git
    - .obsidian
    - .venv
    - node_modules
  extensions:
    - .png
    - .jpg
    - .jpeg
    - .gif
    - .webp
    - .pdf
    - .zip
    - .mp4